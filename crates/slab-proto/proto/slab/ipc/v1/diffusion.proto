syntax = "proto3";

package slab.ipc.v1;

import "slab/ipc/v1/common.proto";

service DiffusionService {
  rpc GenerateImage(ImageRequest) returns (ImageResponse);
  rpc GenerateVideo(VideoRequest) returns (VideoResponse);
  rpc LoadModel(ModelLoadRequest) returns (ModelStatusResponse);
  rpc UnloadModel(ModelUnloadRequest) returns (ModelStatusResponse);
}

message RawImageInput {
  bytes data = 1;
  uint32 width = 2;
  uint32 height = 3;
  uint32 channels = 4;
}

message DiffusionRequestCommon {
  string prompt = 1;
  optional string negative_prompt = 2;
  uint32 width = 3;
  uint32 height = 4;
  RawImageInput init_image = 5;
}

// Keep backend-only controls inside a oneof so the shared request can stay
// stable while individual backends evolve independently.
message GgmlDiffusionImageParams {
  optional uint32 n = 1;
  optional float cfg_scale = 2;
  optional float guidance = 3;
  optional int32 sample_steps = 4;
  optional int64 seed = 5;
  optional string sample_method = 6;
  optional string scheduler = 7;
  optional int32 clip_skip = 8;
  optional float strength = 9;
  optional float eta = 10;
}

message ImageRequest {
  string model = 1;
  DiffusionRequestCommon common = 2;

  oneof backend_params {
    GgmlDiffusionImageParams ggml = 10;
  }
}

message ImageResponse {
  // JSON array of image objects: [{b64, width, height, channels}, ...]
  bytes images_json = 1;
}

message GgmlDiffusionVideoParams {
  optional int32 video_frames = 1;
  optional float fps = 2;
  optional float cfg_scale = 3;
  optional float guidance = 4;
  optional int32 sample_steps = 5;
  optional int64 seed = 6;
  optional string sample_method = 7;
  optional string scheduler = 8;
  optional float strength = 9;
}

message VideoRequest {
  string model = 1;
  DiffusionRequestCommon common = 2;

  oneof backend_params {
    GgmlDiffusionVideoParams ggml = 10;
  }
}

message VideoResponse {
  // JSON array of frame objects: [{b64, width, height, channels}, ...]
  bytes frames_json = 1;
}
