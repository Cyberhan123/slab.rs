syntax = "proto3";

package slab.ipc.v1;

import "slab/ipc/v1/common.proto";

service LlamaService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatRequest) returns (stream ChatStreamChunk);
  rpc LoadModel(ModelLoadRequest) returns (ModelStatusResponse);
  rpc UnloadModel(ModelUnloadRequest) returns (ModelStatusResponse);
}

message Usage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
  uint32 prompt_cached_tokens = 4;
  bool estimated = 5;
}

message ChatToolFunction {
  string name = 1;
  string arguments = 2;
}

message ChatToolCall {
  string id = 1;
  string type = 2;
  ChatToolFunction function = 3;
}

message ChatTextPart {
  string text = 1;
}

message ChatImagePart {
  string image_url = 1;
  string mime_type = 2;
  string detail = 3;
}

message ChatToolResultPart {
  string tool_call_id = 1;
  string value_json = 2;
}

message ChatJsonPart {
  string value_json = 1;
}

// A single structured chat message (role + content) used for chat-template
// aware inference.  The backend passes these directly to the model's embedded
// chat template when `apply_chat_template` is true.
message ChatContentPart {
  oneof part {
    ChatTextPart text = 1;
    ChatTextPart input_text = 2;
    ChatTextPart output_text = 3;
    ChatImagePart image = 4;
    ChatToolResultPart tool_result = 5;
    ChatJsonPart json = 6;
    ChatTextPart refusal = 7;
  }
}

message ChatMessage {
  string role = 1;
  string content = 2;
  repeated ChatContentPart content_parts = 3;
  string name = 4;
  string tool_call_id = 5;
  repeated ChatToolCall tool_calls = 6;
}

message ChatRequest {
  string prompt = 1;
  string model = 2;
  uint32 max_tokens = 3;
  float temperature = 4;
  string session_key = 5;
  // Structured conversation messages.  When non-empty and
  // `apply_chat_template` is true the runtime passes these to the model's
  // embedded chat template instead of using the raw `prompt` string.
  repeated ChatMessage messages = 6;
  // When true, the llama backend applies the model's own embedded chat
  // template to `messages` and uses the result as the inference prompt.
  bool apply_chat_template = 7;
  // Nucleus sampling probability mass.
  // Values <= 0.0 are treated as unset (use backend default).
  // Note: the same sentinel-value convention used by the `temperature` field.
  float top_p = 8;
  // Raw GBNF grammar string to constrain token sampling.
  // Empty string means no grammar constraint.
  string grammar = 9;
  // When true, constrain output to well-formed JSON using the built-in JSON grammar.
  // Ignored when `grammar` is non-empty.
  bool grammar_json = 10;
  // When true, constrain output to a tool-call envelope using the built-in grammar.
  // Ignored when `grammar` is non-empty or `grammar_json` is true.
  bool grammar_tool_call = 11;
}

message ChatResponse {
  string text = 1;
  string finish_reason = 2;
  uint32 tokens_used = 3;
  Usage usage = 4;
}

message ChatStreamChunk {
  string token = 1;
  string error = 2;
  bool done = 3;
  string finish_reason = 4;
  Usage usage = 5;
}
