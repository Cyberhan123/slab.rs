syntax = "proto3";

package slab.ipc.v1;

import "slab/ipc/v1/common.proto";

service LlamaService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatRequest) returns (stream ChatStreamChunk);
  rpc LoadModel(ModelLoadRequest) returns (ModelStatusResponse);
  rpc UnloadModel(ModelUnloadRequest) returns (ModelStatusResponse);
}

message Usage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
  uint32 prompt_cached_tokens = 4;
  bool estimated = 5;
}

message ChatRequest {
  string prompt = 1;
  string model = 2;
  uint32 max_tokens = 3;
  float temperature = 4;
  string session_key = 5;
  // Nucleus sampling probability mass.
  // Values <= 0.0 are treated as unset (use backend default).
  // Note: the same sentinel-value convention used by the `temperature` field.
  float top_p = 8;
  // Keep only the top-k candidate tokens during sampling.
  optional int32 top_k = 11;
  // Minimum probability threshold relative to the most likely token.
  optional float min_p = 12;
  // Presence penalty applied through the llama penalties sampler.
  optional float presence_penalty = 13;
  // Repetition penalty applied through the llama penalties sampler.
  optional float repetition_penalty = 14;
  // Raw GBNF grammar string to constrain token sampling.
  // Empty string means no grammar constraint.
  string gbnf = 9;
  // Stop sequences: generation halts when any of these strings appear in the
  // output.  Checked against the decoded text on each token step.
  repeated string stop_sequences = 10;
}

message ChatResponse {
  string text = 1;
  string finish_reason = 2;
  uint32 tokens_used = 3;
  Usage usage = 4;
  string reasoning_content = 5;
}

message ChatStreamChunk {
  string token = 1;
  string error = 2;
  bool done = 3;
  string finish_reason = 4;
  Usage usage = 5;
  string reasoning_content = 6;
}
