syntax = "proto3";

package slab.ipc.v1;

message StringList {
  repeated string values = 1;
}

message BinaryPayload {
  bytes data = 1;
  optional string mime_type = 2;
  optional string file_name = 3;
}

message Usage {
  optional uint32 prompt_tokens = 1;
  optional uint32 completion_tokens = 2;
  optional uint32 total_tokens = 3;
  optional uint32 prompt_cached_tokens = 4;
  optional bool estimated = 5;
}

message RawImage {
  bytes data = 1;
  optional uint32 width = 2;
  optional uint32 height = 3;
  optional uint32 channels = 4;
}

message RawTensor {
  optional string name = 1;
  repeated int64 shape = 2;
  optional string dtype = 3;
  bytes data = 4;
}

message WhisperSegment {
  optional uint64 start_ms = 1;
  optional uint64 end_ms = 2;
  optional string text = 3;
}

message WhisperTranscription {
  optional string raw_text = 1;
  optional string language = 2;
  repeated WhisperSegment segments = 3;
}

message ModelUnloadRequest {}

message ModelStatusResponse {
  string backend = 1;
  string status = 2;
}
