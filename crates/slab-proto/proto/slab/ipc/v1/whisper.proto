syntax = "proto3";

package slab.ipc.v1;

import "slab/ipc/v1/common.proto";

service WhisperService {
  rpc Transcribe(TranscribeRequest) returns (TranscribeResponse);
  rpc LoadModel(ModelLoadRequest) returns (ModelStatusResponse);
  rpc UnloadModel(ModelUnloadRequest) returns (ModelStatusResponse);
}

message TranscribeRequest {
  string path = 1;
  optional string language = 2;
  optional string prompt = 3;
  optional bool detect_language = 4;
  TranscribeVadOptions vad = 5;
  TranscribeDecodeOptions decode = 6;
}

message TranscribeVadOptions {
  bool enabled = 1;
  string model_path = 2;
  TranscribeVadParams params = 3;
}

message TranscribeVadParams {
  optional float threshold = 1;
  optional int32 min_speech_duration_ms = 2;
  optional int32 min_silence_duration_ms = 3;
  optional float max_speech_duration_s = 4;
  optional int32 speech_pad_ms = 5;
  optional float samples_overlap = 6;
}

message TranscribeDecodeOptions {
  optional int32 offset_ms = 1;
  optional int32 duration_ms = 2;
  optional bool no_context = 3;
  optional bool no_timestamps = 4;
  optional bool token_timestamps = 5;
  optional bool split_on_word = 6;
  optional bool suppress_nst = 7;
  optional float word_thold = 8;
  optional int32 max_len = 9;
  optional int32 max_tokens = 10;
  optional float temperature = 11;
  optional float temperature_inc = 12;
  optional float entropy_thold = 13;
  optional float logprob_thold = 14;
  optional float no_speech_thold = 15;
  optional bool tdrz_enable = 16;
}

message TranscribeResponse {
  string text = 1;
}
