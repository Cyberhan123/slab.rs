[package]
name = "slab-config"
version.workspace = true
edition.workspace = true
description = "Settings, launch configuration, and PMID catalog for slab.rs"
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[[bin]]
name = "generate_settings_document_schema"
path = "src/generate_settings_document_schema.rs"

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
dirs-next = "2.0.0"
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
slab-types = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
utoipa = { version = "5", features = ["uuid", "chrono"] }
uuid = { workspace = true }
windows-sys = { version = "0.61.2", features = ["Win32_Storage_FileSystem"] }

[dev-dependencies]
tempfile = { workspace = true }
