[package]
name = "slab-runtime-core"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[build-dependencies]
slab-libfetch = { workspace = true }


[features]
default = ["all"]
all = ["candle", "onnx","ggml"]
candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
]
onnx = ["dep:ort"]
ggml = ["dep:slab-whisper", "dep:slab-llama"]

[dependencies]
slab-core-macros = { workspace = true }
slab-types = { workspace = true }
slab-utils = { workspace = true }
libloading = { workspace = true }
slab-whisper = { workspace = true, optional = true }
slab-llama = { workspace = true, optional = true }
slab-diffusion = { workspace = true }
tokio = { workspace = true }
slab-libfetch = { workspace = true }
hf-hub = { workspace = true }
thiserror = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
slab-subtitle = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
base64 = { workspace = true }
image = { workspace = true }
ort = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }

[dev-dependencies]
trybuild = "1.0"
tracing-test = { workspace = true }
