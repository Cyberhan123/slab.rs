[package]
name = "slab-hub"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[features]
default = ["provider-hf-hub", "provider-models-cat"]
provider-hf-hub = ["dep:hf-hub"]
provider-models-cat = ["dep:models-cat"]
provider-huggingface-hub-rust = ["dep:huggingface-hub"]

[dependencies]
reqwest = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
strum = { workspace = true }

hf-hub = { workspace = true, default-features = false, features = ["tokio", "native-tls"], optional = true }
models-cat = { workspace = true, default-features = false, features = ["tokio"], optional = true }
huggingface-hub = { workspace = true, default-features = false, optional = true }
