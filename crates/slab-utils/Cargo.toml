[package]
name = "slab-utils"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
hex = { workspace = true }
libloading = { workspace = true }
portable-pty = { workspace = true }
ring = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
uuid = { workspace = true }
dirs = { workspace = true }
dunce = { workspace = true }
schemars = { workspace = true }
ts-rs = { workspace = true, features = [
    "serde-json-impl",
    "no-serde-warnings",
] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
regex-lite = { workspace = true }
assert_cmd = { workspace = true }
runfiles = { workspace = true }
thiserror = { workspace = true }
async_io = { workspace = true }
tokio_util = { workspace = true, features = ["compat"] }
uds_windows = { workspace = true }
tempfile = { workspace = true }
minijinja = { workspace = true }
[dev-dependencies]
pretty_assertions = { workspace = true }

[target.'cfg(windows)'.dependencies]
filedescriptor = { workspace = true }
lazy_static = { workspace = true }
log = { workspace = true }
shared_library = { workspace = true }
winapi = { workspace = true, features = [
    "handleapi",
    "minwinbase",
    "processthreadsapi",
    "synchapi",
    "winbase",
    "wincon",
    "winerror",
    "winnt",
] }
windows = { workspace = true, features = [
    "Win32_Devices_DeviceAndDriverInstallation",
    "Win32_Graphics_Dxgi",
] }
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_Power",
    "Win32_System_SystemServices",
    "Win32_System_Threading",
] }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10.1"
