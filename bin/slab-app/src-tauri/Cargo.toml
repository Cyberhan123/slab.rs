[package]
name = "slab-app"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
readme = "README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "slab_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { workspace = true, features = [] }

[dependencies]
tauri = { workspace = true, features = ["unstable"] }
tauri-plugin-opener = { workspace = true }
tauri-plugin-mcp-bridge = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tauri-plugin-dialog = { workspace = true }
axum = { workspace = true, features = ["ws"] }
futures = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
tokio = { workspace = true }
tauri-plugin-shell = { workspace = true }
log = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-log = { workspace = true }
slab-app-core = { workspace = true }
slab-types = { workspace = true }
slab-config = { workspace = true }
slab-otel = { workspace = true }
slab-utils = { workspace = true }
slab-plugin = { workspace = true }
tokio-tungstenite = { workspace = true }
url = "2"
extism = { workspace = true }
mime_guess = { workspace = true }
percent-encoding = { workspace = true }
base64 = { workspace = true }
validator = { workspace = true }
uuid = { workspace = true }

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-window-state = { workspace = true }
tauri-plugin-decorum = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
