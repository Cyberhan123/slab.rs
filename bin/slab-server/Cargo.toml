[package]
name = "slab-server"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[[bin]]
name = "slab-server"
path = "src/main.rs"

[dependencies]
# Core AI runtime
slab-agent        = { workspace = true }
slab-app-core     = { workspace = true, features = ["axum"] }
slab-runtime-core = { workspace = true }
slab-proto        = { workspace = true }
slab-types        = { workspace = true }
slab-libfetch     = { workspace = true }
hf-hub            = { workspace = true }

# Async runtime
tokio   = { workspace = true }
futures = { workspace = true }
bytes   = { workspace = true }

# Web framework + middleware
axum       = { workspace = true, features = ["multipart"] }
tower      = { workspace = true }
tower-http = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
tonic = { workspace = true }
parity-tokio-ipc = { workspace = true }
winapi = { workspace = true }
hyper-util = { workspace = true }

# Serialization
serde      = { workspace = true }
serde_json = { workspace = true }
genai      = { workspace = true }
reqwest    = { workspace = true }

# Database (SQLite; swappable via trait)
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls", "migrate", "chrono", "uuid", "_sqlite"] }

# IDs & time
uuid   = { workspace = true }
chrono = { workspace = true }

# OpenAPI / Swagger
utoipa            = { version = "5", features = ["axum_extras", "uuid", "chrono"] }
utoipa-axum       = { version = "0.2" }
utoipa-swagger-ui = { version = "9", features = ["axum","cache"] }

# Logging
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender   = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow    = { workspace = true }
validator = { version = "0.20", features = ["derive"] }

# Misc
async-trait   = { workspace = true }
base64    = { workspace = true }
bytemuck  = { workspace = true }
strum = { workspace = true }
clap = { workspace = true }
all-smi = "0.20"
image     = { workspace = true }
dirs-next = "2.0.0"
jsonschema = { version = "0.46.0", default-features = false }
windows-sys = { version = "0.61.2", features = ["Win32_Storage_FileSystem"] }
ffmpeg-sidecar = { workspace = true, features = ["download_ffmpeg"] }
