[package]
name = "slab-server"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[features]
gpu-telemetry = ["slab-app-core/gpu-telemetry"]

[[bin]]
name = "slab-server"
path = "src/main.rs"

[dependencies]
# Core AI runtime
slab-agent        = { workspace = true }
slab-app-core     = { workspace = true, features = ["axum"] }
slab-runtime-core = { workspace = true }
slab-types        = { workspace = true }
slab-jsonrpc      = { workspace = true }
slab-otel         = { workspace = true }
slab-utils        = { workspace = true }

# Async runtime
tokio   = { workspace = true }
futures = { workspace = true }
tokio-stream = { workspace = true, features = ["sync"] }
bytes   = { workspace = true }

# Web framework + middleware
axum       = { workspace = true, features = ["multipart", "ws"] }
tower      = { workspace = true }
tower-http = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
tonic = { workspace = true }
tokio-tungstenite = { workspace = true }

# Serialization
serde      = { workspace = true }
serde_json = { workspace = true }

# Database (SQLite; swappable via trait)
sqlx = { workspace = true, features = ["sqlite", "runtime-tokio", "migrate", "chrono", "uuid"] }

# IDs & time
uuid   = { workspace = true }
chrono = { workspace = true }

# OpenAPI / Swagger
utoipa            = { workspace = true, features = ["axum_extras", "uuid", "chrono"] }
utoipa-axum       = { workspace = true }
utoipa-swagger-ui = { workspace = true, features = ["axum","cache"] }

# Logging
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-log        = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow    = { workspace = true }
validator = { workspace = true, features = ["derive"] }

# Misc
async-trait   = { workspace = true }
clap = { workspace = true }
