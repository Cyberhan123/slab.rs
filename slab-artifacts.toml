# slab-artifacts.toml
# Declarative artifact manifest for slab ML backend libraries.
# Asset patterns use template variables: {version}, {os}, {arch}, optional
# {variant}, and {extension}.
# Target availability is organised by OS -> arch -> variants. When `variants` is
# omitted or `[]`, the artifact is treated as variant-less for that OS/arch pair.
# Each target may also declare `extension` and `checksum` / `checksums`.

[metadata]
schema_version = "1"

[artifacts.ggml]
repo = "seasonjs/ggml.cpp-build"
version = "v0.9.8"
lib_name = "ggml"
# Asset name pattern with template variables: {version}, {os}, {arch}, {variant}
asset_pattern = "ggml-{version}-{os}-{arch}.{extension}"

[artifacts.ggml.targets.windows.x86_64]
variants = []
extension = "zip"
# checksums= "sha256:abcdef..."

[artifacts.ggml.targets.linux.x86_64]
variants = []
extension = "tar.gz"
# checksums= "sha256:abcdef..."

[artifacts.ggml.targets.macos.aarch64]
variants = []
extension = "tar.gz"
# checksums= "sha256:abcdef..."

[artifacts.llama]
repo = "seasonjs/llama.cpp-build"
version = "v8464"
lib_name = "llama"
# Asset name pattern with template variables: {version}, {os}, {arch}, {variant}
asset_pattern = "llama-sdk-{version}-{os}-{arch}.{extension}"

[artifacts.llama.targets.windows.x86_64]
variants = []
extension = "zip"
# checksums= "sha256:abcdef..."

[artifacts.llama.targets.linux.x86_64]
variants = []
extension = "tar.gz"
# checksums= "sha256:abcdef..."

[artifacts.llama.targets.macos.aarch64]
variants = []
extension = "tar.gz"
# checksums= "sha256:abcdef..."

[artifacts.whisper]
repo = "seasonjs/whisper.cpp-build"
version = "v1.8.4"
lib_name = "whisper"
asset_pattern = "whisper-sdk-{os}-{arch}.{extension}"

[artifacts.whisper.targets.windows.x86_64]
variants = []
extension = "zip"
# checksums = "sha256:abcdef..."

[artifacts.whisper.targets.linux.x86_64]
