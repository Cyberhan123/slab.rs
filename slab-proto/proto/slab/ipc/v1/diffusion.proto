syntax = "proto3";

package slab.ipc.v1;

import "slab/ipc/v1/common.proto";

service DiffusionService {
  rpc GenerateImage(ImageRequest) returns (ImageResponse);
  rpc GenerateVideo(VideoRequest) returns (VideoResponse);
  rpc LoadModel(ModelLoadRequest) returns (ModelStatusResponse);
  rpc UnloadModel(ModelUnloadRequest) returns (ModelStatusResponse);
  rpc ReloadLibrary(ReloadLibraryRequest) returns (ModelStatusResponse);
}

// ── Image generation ─────────────────────────────────────────────────────────

message ImageRequest {
  string model = 1;
  string prompt = 2;
  uint32 n = 3;

  // Dimensions
  uint32 width = 4;
  uint32 height = 5;

  // Generation parameters
  string negative_prompt = 6;
  float cfg_scale = 7;
  float guidance = 8;
  int32 sample_steps = 9;
  int64 seed = 10;
  string sample_method = 11;
  string scheduler = 12;
  int32 clip_skip = 13;
  float strength = 14;
  float eta = 15;

  // Init image for img2img (raw RGB pixel data)
  bytes init_image_data = 16;
  uint32 init_image_width = 17;
  uint32 init_image_height = 18;
  uint32 init_image_channels = 19;
}

message ImageResponse {
  // JSON array of image objects: [{b64, width, height, channels}, ...]
  bytes images_json = 1;
}

// ── Video generation ─────────────────────────────────────────────────────────

message VideoRequest {
  string model = 1;
  string prompt = 2;
  uint32 width = 3;
  uint32 height = 4;
  string negative_prompt = 5;
  float cfg_scale = 6;
  float guidance = 7;
  int32 sample_steps = 8;
  int64 seed = 9;
  string sample_method = 10;
  string scheduler = 11;
  int32 video_frames = 12;
  float fps = 13;
  float strength = 14;
  // Optional init image (raw RGB pixels)
  bytes init_image_data = 15;
  uint32 init_image_width = 16;
  uint32 init_image_height = 17;
  uint32 init_image_channels = 18;
}

message VideoResponse {
  // JSON array of frame objects: [{b64, width, height, channels}, ...]
  bytes frames_json = 1;
}
