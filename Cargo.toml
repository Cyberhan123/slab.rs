[workspace]
resolver = "2"
members = [
    "slab-app/src-tauri",
    "slab-proto",
    "slab-runtime",
    "slab-agent",
    "slab-build-utils",
    "slab-diffusion", 
    "slab-diffusion-sys",
    "slab-libfetch",
    "slab-llama",
    "slab-llama-sys",
    "slab-whisper",
    "slab-whisper-sys",
    "slab-core-macros",
    "slab-core",
    "slab-types",
    "slab-server",
    "slab-subtitle",
    "slab-ggml",
    "slab-ggml-sys",
]

exclude = [
    "slab-app/src",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
description = "slab ML"
repository = "https://github.com/Cyberhan123/slab.rs"
keywords = ["blas", "tensor", "machine-learning"]
categories = ["science"]
license = "Apache-2.0"

[workspace.dependencies]
slab-core = { path = "./slab-core", package = "slab-core", version = "0.0.1" }
slab-agent = { path = "./slab-agent", package = "slab-agent", version = "0.0.1" }
slab-proto = { path = "./slab-proto", package = "slab-proto", version = "0.0.1" }
slab-types = { path = "./slab-types", package = "slab-types", version = "0.0.1" }
slab-diffusion-sys = { path = "./slab-diffusion-sys", package = "slab-diffusion-sys", version = "0.0.1" }
slab-diffusion = { path = "./slab-diffusion", package = "slab-diffusion", version = "0.0.1" }
slab-llama = { path = "./slab-llama", package = "slab-llama", version = "0.0.1" }
slab-llama-sys = { path = "./slab-llama-sys", package = "slab-llama-sys", version = "0.0.1" }
slab-whisper = { path = "./slab-whisper", package = "slab-whisper", version = "0.0.1" }
slab-whisper-sys = { path = "./slab-whisper-sys", package = "slab-whisper-sys", version = "0.0.1" }
slab-libfetch = { path = "./slab-libfetch", package = "slab-libfetch", version = "0.0.1" }
slab-build-utils = { path = "./slab-build-utils", package = "slab-build-utils", version = "0.0.1" }
slab-core-macros = { path = "./slab-core-macros", package = "slab-core-macros", version = "0.0.1" }
slab-subtitle = { path = "./slab-subtitle", package = "slab-subtitle", version = "0.0.1" }
slab-ggml-sys = { path = "./slab-ggml-sys", package = "slab-ggml-sys", version = "0.0.1" }
slab-ggml = { path = "./slab-ggml", package = "slab-ggml", version = "0.0.1" }

combine = "4.6.7"
anyhow = "1.0.101"
bindgen = "0.72.1"
flate2 = "1.1.9"
libloading = "0.8.9"
reqwest = { version = "0.13.2", features = ["stream", "native-tls", "json", "blocking"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tar = "0.4.45"
tokio = { version = "1.49.0", features = ["full"] }
zip = { version = "4.6.1", default-features = false, features = ["deflate"] }
hf-hub = "0.4.1"
thiserror = "2.0.18"
derive_builder = "0.20"
libc = "0.2"
bytes = "1"
futures = "0.3"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
genai = "0.5.3"
base64 = "0.22"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
ffmpeg-sidecar = { version = "2", features = ["download_ffmpeg"] }
ort = { version = "2.0.0-rc.12", features = ["load-dynamic"] }
candle-core = "0.9.2"
candle-nn = "0.9.2"
candle-transformers = "0.9.2"
tokenizers = "0.22.2"
schemars = { version = "1.0", features = ["uuid1", "chrono04"] }
sha2 = "0.10"
toml = "0.8"
# Logging / tracing
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
tracing-test = "0.2"
# Web / gRPC
axum = { version = "0.8", features = ["macros"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["cors", "trace", "request-id", "set-header", "util"] }
tonic = { version = "0.12", features = ["transport"] }
tonic-build = "0.12"
prost = "0.13"
http = "1"
http-body-util = "0.1"
hyper-util = { version = "0.1", features = ["tokio"] }
# IPC / streaming
parity-tokio-ipc = "0.9"
tokio-stream = "0.1"
# Utilities
async-trait = "0.1"
bytemuck = "1"
strum = { version = "0.28.0", features = ["derive"] }
clap = { version = "4.5.60", features = ["derive"] }
protoc-bin-vendored = "3"
cargo_metadata = "0.23.1"
