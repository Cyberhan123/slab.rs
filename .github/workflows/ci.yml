name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  cargo-check:
    name: Cargo - check / clippy / test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            python3-dev

      - name: Apply patches (vendor setup)
        run: bun run scripts/apply-patches.ts

      - name: cargo check
        run: bun ./scripts/cargo/validate.ts check

      - name: cargo clippy
        run: bun ./scripts/cargo/validate.ts clippy

      - name: cargo test
        run: bun ./scripts/cargo/validate.ts test

  frontend-check:
    name: Frontend contract / test / bundle gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Bun install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply patches (vendor setup)
        run: bun run scripts/apply-patches.ts

      - name: Check API type drift
        run: |
          bun run gen:api
          git diff --exit-code packages/api/src/v1.d.ts python/slab-python-sdk/src/slab_api_client

      - name: Check settings/schema drift
        run: |
          bun run gen:schemas
          git diff --exit-code docs/public/manifests/v1/settings-document.schema.json docs/public/manifests/v3/slab-manifest.schema.json

      # Plugin packs are build artifacts (plugins/dist is gitignored), so this
      # is a build-sanity gate: it fails the PR if a plugin manifest/shape change
      # breaks packing. There is no diff to check against tracked source.
      - name: Check plugin packs build
        run: bun run gen:plugin-packs

      # Plan F PR gate: contract/schema drift, frontend build, deterministic
      # unit tests, browser-mode regressions, and bundle budget. Fullstack E2E
      # stays in the release/manual workflow to keep ordinary PR feedback tight.
      - name: Type-check frontend packages
        run: bun run check:frontend

      - name: Run frontend tests
        run: bun run test:frontend

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run browser regression tests
        run: bun run test:browser

      - name: Check desktop bundle budget
        run: bun run check:bundle-budget

  fullstack-e2e:
    name: Fullstack E2E (manual / nightly)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            python3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply patches (vendor setup)
        run: bun run scripts/apply-patches.ts

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run release-risk fullstack E2E
        run: bun run test:e2e
