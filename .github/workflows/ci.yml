name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bazel-check:
    name: Bazel build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            python3-dev

      - name: bazel module lock check
        run: bazelisk mod deps --lockfile_mode=error

      - name: bazel query
        run: bazelisk query //...

      - name: bazel build
        run: bazelisk build --config=ci //...

      - name: bazel test
        run: bazelisk test --config=ci //...

      - name: bazel rust clippy
        run: bazelisk build --config=ci //tools/rust:clippy_workspace

  frontend-check:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check API type drift
        run: |
          bun run gen:api
          git diff --exit-code packages/api/src/v1.d.ts

      - name: Type-check & build
        run: bun run build:desktop
