name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust – check & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache vendored native artifacts
        uses: actions/cache@v4
        with:
          path: |
            vendor/ggml
            vendor/llama
            vendor/whisper
            vendor/diffusion
          key: ${{ runner.os }}-vendor-${{ hashFiles('vendor/slab-artifacts.toml') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      # Linux system libraries required by some crates (e.g. OpenSSL, GTK for Tauri)
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (workspace)
        run: cargo build --workspace

      - name: cargo test (workspace)
        run: cargo test --workspace

  frontend-check:
    name: Frontend – build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check & build
        run: bun run build:desktop
