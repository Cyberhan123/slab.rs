name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bazel-check:
    name: Bazel – build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazelisk \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazelisk

      - name: Cache Bazelisk downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazelisk
          key: bazelisk-${{ hashFiles('.bazeliskrc') }}

      - name: Cache Bazel repository cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            python3-dev

      - name: bazel build
        run: |
          bazelisk build --config=ci \
            //bin/slab-server:slab-server \
            //bin/slab-js-runtime:slab-js-runtime \
            //bin/slab-python-runtime:slab-python-runtime \
            //bin/slab-mcp-server:slab-mcp-server

      - name: bazel test
        run: bazelisk test --config=ci //...

  frontend-check:
    name: Frontend – build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check API type drift
        run: |
          bun run gen:api
          git diff --exit-code packages/api/src/v1.d.ts

      - name: Type-check & build
        run: bun run build:desktop
