name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-24.04
    timeout-minutes: 59
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Verify Linux x86_64 runner
        run: |
          test "$(uname -m)" = "x86_64"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            protobuf-compiler \
            libssl-dev \
            pkg-config

      - name: Verify protoc
        run: protoc --version

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target directories
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: copilot-linux-x86_64
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Cache vendored native artifacts
        uses: actions/cache@v4
        with:
          path: |
            vendor/ggml
            vendor/llama
            vendor/whisper
            vendor/diffusion
          key: copilot-${{ runner.os }}-vendor-${{ hashFiles('vendor/slab-artifacts.toml') }}
          restore-keys: |
            copilot-${{ runner.os }}-vendor-

      - name: Prefetch Rust dependencies
        run: cargo fetch

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun/install/cache
            ~/Library/Caches/Bun/install/cache
            slab-app/node_modules
          key: copilot-${{ runner.os }}-bun-${{ hashFiles('slab-app/bun.lock', 'slab-app/package.json') }}
          restore-keys: |
            copilot-${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: slab-app
        run: bun install

      - name: Warm up key Rust crates
        run: |
          cargo check -p slab-server
          cargo check -p slab-runtime
