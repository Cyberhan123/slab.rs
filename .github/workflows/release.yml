name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install chromium

      - name: Run release fullstack E2E
        run: bun run test:e2e

      - name: Validate release tag matches project versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagRaw = $env:GITHUB_REF_NAME -replace '^v', ''
          $tagBase = ($tagRaw -split '-', 2)[0]
          $cargoVersion = (Select-String -Path Cargo.toml -Pattern 'version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches[0].Groups[1].Value
          $tauriVersion = (Get-Content -Raw bin/slab-app/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $rootPkgVersion = (Get-Content -Raw package.json | ConvertFrom-Json).version

          if ($tagBase -ne $cargoVersion -or $tagBase -ne $tauriVersion -or $tagBase -ne $rootPkgVersion) {
            Write-Host "Tag version:    $tagRaw"
            Write-Host "Tag base:       $tagBase"
            Write-Host "Cargo version:  $cargoVersion"
            Write-Host "Tauri version:  $tauriVersion"
            Write-Host "Root pkg ver:   $rootPkgVersion"
            throw "Version mismatch between git tag and project files"
          }

      - name: Build Windows installer
        run: bun run build:windows-installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release bundle artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: slab-windows-installer
          path: |
            target/release/bundle/nsis/**
            bin/slab-app/src-tauri/target/release/bundle/nsis/**
          retention-days: 7
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/**
