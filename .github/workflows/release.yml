name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build slab-server and slab-runtime for each platform ──────────────────
  build-server:
    name: Build server binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            server_bin: slab-server
            runtime_bin: slab-runtime
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            server_bin: slab-server.exe
            runtime_bin: slab-runtime.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            server_bin: slab-server
            runtime_bin: slab-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Build slab-server (release)
        run: cargo build --release -p slab-server --target ${{ matrix.target }}

      - name: Build slab-runtime (release)
        run: cargo build --release -p slab-runtime --target ${{ matrix.target }}

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.server_bin }}
            target/${{ matrix.target }}/release/${{ matrix.runtime_bin }}
          retention-days: 1

  # ── Tauri desktop bundle ────────────────────────────────────────────────────
  tauri-build:
    name: Tauri bundle (${{ matrix.platform }})
    needs: build-server
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
          - platform: macos
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: slab-app/src-tauri/binaries/

      - name: Mark binaries executable (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x slab-app/src-tauri/binaries/slab-server
          chmod +x slab-app/src-tauri/binaries/slab-runtime

      - name: Install frontend dependencies
        working-directory: slab-app
        run: bun install

      - name: Build Tauri app
        working-directory: slab-app
        run: bun run tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Tauri bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slab-${{ matrix.artifact_suffix }}
          path: |
            slab-app/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: tauri-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
