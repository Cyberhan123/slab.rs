name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  warm-cache:
    name: Warm Cargo cache (${{ matrix.platform }})
    if: github.ref_type == 'branch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.platform }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace (cache warm-up)
        run: cargo build --workspace --release

  release:
    name: cargo make release (${{ matrix.platform }})
    if: github.ref_type == 'tag'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO: we need to support liunux
          # - platform: linux
          #   os: ubuntu-latest
          #   artifact_suffix: linux-x86_64
          - platform: windows
            os: windows-latest
            artifact_suffix: windows-x86_64
          - platform: macos
            os: macos-latest
            artifact_suffix: macos-aarch64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate release tag matches project versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_RAW="${GITHUB_REF_NAME#v}"
          TAG_BASE="${TAG_RAW%%-*}"
          CARGO_VERSION="$(grep -E '^version[[:space:]]*=[[:space:]]*"' Cargo.toml | head -n1 | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)"/\1/')"
          TAURI_VERSION="$(grep -E '"version"[[:space:]]*:[[:space:]]*"' bin/slab-app/src-tauri/tauri.conf.json | head -n1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          ROOT_PKG_VERSION="$(grep -E '"version"[[:space:]]*:[[:space:]]*"' package.json | head -n1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"

          if [ "$TAG_BASE" != "$CARGO_VERSION" ] || [ "$TAG_BASE" != "$TAURI_VERSION" ] || [ "$TAG_BASE" != "$ROOT_PKG_VERSION" ]; then
            echo "Tag version:    $TAG_RAW"
            echo "Tag base:       $TAG_BASE"
            echo "Cargo version:  $CARGO_VERSION"
            echo "Tauri version:  $TAURI_VERSION"
            echo "Root pkg ver:   $ROOT_PKG_VERSION"
            echo "Version mismatch between git tag and project files"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.platform }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release via cargo-make
        run: cargo make release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slab-${{ matrix.artifact_suffix }}
          path: |
            target/release/bundle/
          retention-days: 7
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -type f -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Create GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/**
