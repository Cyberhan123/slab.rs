name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: cargo make release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - platform: windows
            os: windows-latest
            artifact_suffix: windows-x86_64
          - platform: macos
            os: macos-latest
            artifact_suffix: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.platform }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release via cargo-make
        run: cargo make release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slab-${{ matrix.artifact_suffix }}
          path: |
            bin/slab-app/src-tauri/target/release/bundle/
          retention-days: 7
          if-no-files-found: error
