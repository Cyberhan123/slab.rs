version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope