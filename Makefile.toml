[tasks.dev]
workspace = false
dependencies = ["build-runtime-dev","build-server-dev", "run-tauri"]

[tasks.release]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task release-windows
else
    cm_run_task release-default
end
'''

[tasks.release-default]
workspace = false
dependencies = ["build-runtime-release","build-server-release", "build-tauri-release"]

[tasks.release-windows]
workspace = false
dependencies = [
    "build-runtime-release",
    "build-server-release",
    "stage-windows-release-payloads",
    "build-windows-full-installer",
    "build-tauri-release-windows",
]

[tasks.debug]
workspace = false
dependencies = ["build-runtime-dev","build-server-dev", "build-tauri-debug"]

[tasks.check]
workspace = false
command = "cargo"
args = ["check", "--workspace"]

[tasks.test]
workspace = false
command = "cargo"
args = ["test", "--workspace"]

[tasks.build-server-dev]
workspace = false
command = "cargo"
args = ["build", "-p", "slab-server"]

[tasks.build-runtime-dev]
workspace = false
command = "cargo"
args = ["build", "-p", "slab-runtime"]

[tasks.build-server-release]
workspace = false
command = "cargo"
args = ["build", "--release", "-p", "slab-server"]

[tasks.build-runtime-release]
workspace = false
command = "cargo"
args = ["build", "--release", "-p", "slab-runtime"]

[tasks.run-tauri]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task run-tauri-windows
else
    cm_run_task run-tauri-default
end
'''

[tasks.run-tauri-default]
workspace = false
command = "bun"
args = ["run", "dev"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.run-tauri-windows]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "dev",
    "--config",
    "src-tauri/tauri.windows.dev.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-release]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task build-tauri-release-windows
else
    cm_run_task build-tauri-release-default
end
'''

[tasks.build-tauri-release-default]
workspace = false
command = "bun"
args = ["run", "tauri", "build"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-release-windows]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "build",
    "--bundles",
    "nsis",
    "--config",
    "src-tauri/tauri.windows.release.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-debug]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task build-tauri-debug-windows
else
    cm_run_task build-tauri-debug-default
end
'''

[tasks.build-tauri-debug-default]
workspace = false
command = "bun"
args = ["run", "tauri", "build", "--no-bundle", "--debug"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-debug-windows]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "build",
    "--no-bundle",
    "--debug",
    "--config",
    "src-tauri/tauri.windows.dev.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.install-frontend]
workspace = false
command = "bun"
args = ["install"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.run-server]
workspace = false
command = "cargo"
args = ["run", "--bin", "slab-server", "--", "--settings-path", "./testdata/api-settings.json"]

[tasks.api]
workspace = false
script_runner = "@duckscript"
script = '''
docs_url = set http://127.0.0.1:3000/api-docs/openapi.json
server_started = set false
server_pid = set ""

fn probe_docs
	probe_exit = exec --get-exit-code bun -e "fetch(process.argv[1]).then((response)=>process.exit(response.ok ? 0 : 1)).catch(()=>process.exit(1))" ${docs_url}
	probe_ready = not ${probe_exit}
	return ${probe_ready}
end

fn cleanup_server
	if not ${server_started}
		return
	end

	windows = is_windows
	if ${windows}
		exec taskkill /PID ${server_pid} /T /F
	else
		exec kill ${server_pid}
	end
end

probe_ready = probe_docs
need_server = not ${probe_ready}

if ${need_server}
	cm_run_task build-server-dev

	windows = is_windows
	if ${windows}
		server_bin = set "${CARGO_MAKE_CRATE_TARGET_DIRECTORY}/debug/slab-server.exe"
	else
		server_bin = set "${CARGO_MAKE_CRATE_TARGET_DIRECTORY}/debug/slab-server"
	end

	if not is_file ${server_bin}
		echo slab-server binary not found after build.
		exit 1
	end

	server_pid = spawn --silent ${server_bin} --settings-path ./testdata/api-settings.json
	server_started = set true

	attempts_remaining = set 50
	ready = set false
	timed_out = set false
	while not ${ready}
		probe_ready = probe_docs
		if ${probe_ready}
			ready = set true
		else
			attempts_remaining = calc ${attempts_remaining} - 1
			if not ${attempts_remaining}
				timed_out = set true
				ready = set true
			else
				sleep 200
			end
		end
	end

	if ${timed_out}
		echo slab-server did not expose /api-docs/openapi.json in time.
		cleanup_server
		exit 1
	end
end

cd ${CARGO_MAKE_WORKING_DIRECTORY}/packages/slab-desktop
api_result = exec bun run api
api_succeeded = not ${api_result.code}
api_failed = not ${api_succeeded}

if ${server_started}
	cleanup_server
end

if ${api_failed}
	if not is_empty ${api_result.stdout}
		echo ${api_result.stdout}
	end
	if not is_empty ${api_result.stderr}
		echo ${api_result.stderr}
	end
	exit ${api_result.code}
end
'''

[tasks.build-tauri-release-windows-full-installer]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "build",
    "--bundles",
    "nsis",
    "--config",
    "src-tauri/tauri.windows.offline-release.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"
env = { SLAB_SKIP_VENDOR_RUNTIME_SYNC = "1" }

[tasks.pack-windows-full-installer]
workspace = false
command = "cargo"
args = ["run", "--release", "-p", "slab-windows-full-installer", "--", "pack"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.stage-windows-release-payloads]
workspace = false
command = "cargo"
args = ["run", "--release", "-p", "slab-windows-full-installer", "--", "stage-payloads"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.build-windows-full-installer]
workspace = false
dependencies = [
    "build-tauri-release-windows-full-installer",
    "pack-windows-full-installer",
]
