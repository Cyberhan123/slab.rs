[tasks.dev]
workspace = false
dependencies = ["prepare-ffmpeg-sdk","build-runtime-dev","build-js-runtime-dev","build-server-dev", "build-language-servers", "run-tauri"]

[tasks.prepare-ffmpeg-sdk]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task prepare-ffmpeg-sdk-windows
else
    echo "Skipping FFmpeg SDK bootstrap on non-Windows host"
end
'''

[tasks.prepare-ffmpeg-sdk-windows]
workspace = false
command = "powershell"
args = [
    "-NoProfile",
    "-ExecutionPolicy",
    "Bypass",
    "-Command",
    "& { $root = '${CARGO_MAKE_WORKING_DIRECTORY}'; $sdkRoot = Join-Path $root '.slab/ffmpeg-sdk/windows-x64'; $sdkDir = Join-Path $sdkRoot 'ffmpeg-n7.1-latest-win64-gpl-shared-7.1'; if (-not (Test-Path (Join-Path $sdkDir 'bin/ffmpeg.exe'))) { New-Item -ItemType Directory -Force -Path $sdkRoot | Out-Null; $zip = Join-Path $sdkRoot 'ffmpeg-n7.1-shared.zip'; Invoke-WebRequest -Uri 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip' -OutFile $zip; Expand-Archive -LiteralPath $zip -DestinationPath $sdkRoot -Force } }",
]

[tasks.release]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task release-windows
else
    cm_run_task release-default
end
'''

[tasks.release-default]
workspace = false
dependencies = ["build-runtime-release","build-js-runtime-release","build-server-release", "build-language-servers", "build-tauri-release"]

[tasks.release-windows]
workspace = false
dependencies = [
    "build-runtime-release",
    "build-js-runtime-release",
    "build-server-release",
    "build-language-servers",
    "stage-windows-release-payloads",
    "build-windows-full-installer",
    "build-tauri-release-windows",
]

[tasks.debug]
workspace = false
dependencies = ["build-runtime-dev","build-js-runtime-dev","build-server-dev", "build-language-servers", "build-plugin-packs", "build-tauri-debug"]

[tasks.check]
workspace = false
command = "cargo"
args = ["check", "--workspace"]

[tasks.test]
workspace = false
command = "cargo"
args = ["test", "--workspace"]

[tasks.build-server-dev]
workspace = false
command = "cargo"
args = ["build", "-p", "slab-server"]
env = { FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1" }

[tasks.build-runtime-dev]
workspace = false
command = "cargo"
args = ["build", "-p", "slab-runtime"]
env = { FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1" }

[tasks.build-js-runtime-dev]
workspace = false
command = "cargo"
args = ["build", "-p", "slab-js-runtime"]
env = { FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1" }

[tasks.build-server-release]
workspace = false
command = "cargo"
args = ["build", "--release", "-p", "slab-server"]
env = { FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1" }

[tasks.build-runtime-release]
workspace = false
command = "cargo"
args = ["build", "--release", "-p", "slab-runtime"]
env = { FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1" }

[tasks.build-js-runtime-release]
workspace = false
command = "cargo"
args = ["build", "--release", "-p", "slab-js-runtime"]
env = { FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1" }

[tasks.run-tauri]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task run-tauri-windows
else
    cm_run_task run-tauri-default
end
'''

[tasks.run-tauri-default]
workspace = false
command = "bun"
args = ["run", "dev"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.run-tauri-windows]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "dev",
    "--config",
    "src-tauri/tauri.windows.dev.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"
env = { SLAB_SKIP_VENDOR_RUNTIME_SYNC = "1", SLAB_SKIP_BUNDLED_PLUGIN_SYNC = "1", FFMPEG_DIR = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1", PATH = "${CARGO_MAKE_WORKING_DIRECTORY}/.slab/ffmpeg-sdk/windows-x64/ffmpeg-n7.1-latest-win64-gpl-shared-7.1/bin;${PATH}" }

[tasks.build-plugin-packs]
workspace = false
command = "bun"
args = ["run", "gen:plugin-packs"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.build-language-servers]
workspace = false
command = "bun"
args = ["run", "build:language-servers"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.build-tauri-release]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task build-tauri-release-windows
else
    cm_run_task build-tauri-release-default
end
'''

[tasks.build-tauri-release-default]
workspace = false
command = "bun"
args = ["run", "tauri", "build"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-release-windows]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "build",
    "--bundles",
    "nsis",
    "--config",
    "src-tauri/tauri.windows.release.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-debug]
workspace = false
script_runner = "@duckscript"
script = '''
windows = is_windows

if ${windows}
    cm_run_task build-tauri-debug-windows
else
    cm_run_task build-tauri-debug-default
end
'''

[tasks.build-tauri-debug-default]
workspace = false
command = "bun"
args = ["run", "tauri", "build", "--no-bundle", "--debug"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.build-tauri-debug-windows]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "build",
    "--no-bundle",
    "--debug",
    "--config",
    "src-tauri/tauri.windows.dev.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"

[tasks.install-frontend]
workspace = false
command = "bun"
args = ["install"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.run-server]
workspace = false
command = "cargo"
args = ["run", "--bin", "slab-server", "--", "--settings-path", "./testdata/api-settings.json"]

[tasks.api]
workspace = false
command = "bun"
args = ["run", "gen:api"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.build-tauri-release-windows-full-installer]
workspace = false
command = "bun"
args = [
    "run",
    "tauri",
    "build",
    "--bundles",
    "nsis",
    "--config",
    "src-tauri/tauri.windows.offline-release.conf.json",
]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}/bin/slab-app"
env = { SLAB_SKIP_VENDOR_RUNTIME_SYNC = "1" }

[tasks.pack-windows-full-installer]
workspace = false
command = "cargo"
args = ["run", "--release", "-p", "slab-windows-full-installer", "--", "pack"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.stage-windows-release-payloads]
workspace = false
command = "cargo"
args = ["run", "--release", "-p", "slab-windows-full-installer", "--", "stage-payloads"]
cwd = "${CARGO_MAKE_WORKING_DIRECTORY}"

[tasks.build-windows-full-installer]
workspace = false
dependencies = [
    "build-tauri-release-windows-full-installer",
    "pack-windows-full-installer",
]
